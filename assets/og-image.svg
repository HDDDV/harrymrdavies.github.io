<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" role="img" aria-label="Harry M. R. Davies — helping businesses put AI to work">
  <rect width="1200" height="630" fill="#F4EFE4"/>

  <!-- Left: text -->
  <text x="80" y="182" font-family="monospace" font-size="20" letter-spacing="5" fill="#3F6B4C">FOUNDER · INVESTOR · ADVISOR</text>
  <text x="76" y="300" font-family="Georgia, serif" font-size="68" font-weight="600" fill="#1E1E1C">Helping businesses</text>
  <text x="76" y="384" font-family="Georgia, serif" font-size="68" font-weight="600" fill="#1E1E1C">put <tspan font-style="italic" fill="#3F6B4C">AI to work.</tspan></text>
  <text x="80" y="470" font-family="monospace" font-size="22" letter-spacing="2" fill="#1E1E1C" fill-opacity="0.75">Harry M. R. Davies · harrymrdavies.com</text>

  <!-- Right: photo in a green frame -->
  <clipPath id="round"><rect x="757" y="131" width="352" height="352" rx="16"/></clipPath>
  <rect x="741" y="115" width="384" height="384" rx="28" fill="#3F6B4C"/>
  <image xlink:href="portrait.png" x="757" y="131" width="352" height="352" clip-path="url(#round)" preserveAspectRatio="xMidYMid slice"/>
